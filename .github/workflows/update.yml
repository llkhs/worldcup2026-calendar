name: 自动更新 2026 世界杯日历

on:
  schedule:
    # 全年无休，每 30 分钟雷打不动自动运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 保留网页上手动触发运行的功能

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整提交历史以供推送至 Gitee

    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 运行同步脚本并生成日历
      run: python update_calendar.py

    - name: 提交更新到 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 优先安全添加日历主文件
        git add worldcup2026.ics
        
        # 2. 🟢【防御性 Git 添加】：只有当比分库文件真实存在时才添加，不存在则安全跳过，绝不报错崩溃！
        if [ -f "worldcup2026_results.json" ]; then
          git add worldcup2026_results.json
          echo "✅ 成功找到比分锁定库，已加入提交列表。"
        else
          echo "⚠️ 未检测到比分锁定库，跳过添加，继续下一步。"
        fi
        
        git diff-index --quiet HEAD || git commit -m "自动同步世界杯最新对阵 [skip ci]"
        git push origin HEAD:main

    - name: 自动同步到 Gitee 仓库
      run: |
        # 3. 🟢【防御性远程连接】：先强行清除可能残留的旧 gitee 链接，彻底免疫“远程链接已存在”报错
        git remote remove gitee 2>/dev/null || true
        
        # ⚠️ 【请在此修改】：务必将下方链接中的 [你的Gitee用户名] 和 [你的Gitee仓库名] 替换为您在 Gitee 上的真实路径！
        git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/papaya365/worldcup2026-calendar.git
        
        # 强制推送到 Gitee 的主分支（请根据您 Gitee 的默认分支是 master 还是 main 决定，如果是 main，请改为 HEAD:main）
        git push -f gitee HEAD:main
