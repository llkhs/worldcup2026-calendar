name: 自动更新 2026 世界杯日历

on:
  schedule:
    # 彻底简化：全年无休，每 30 分钟雷打不动自动运行一次（最稳妥，100% 避开解析 Bug）
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整提交历史以供推送

    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 运行同步脚本并生成 ICS
      run: python update_calendar.py

- name: 提交更新到 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # 🟢 【修改处】：同时把比分锁定库 worldcup2026_results.json 提交保存！
        git add worldcup2026.ics worldcup2026_results.json
        git diff-index --quiet HEAD || git commit -m "自动同步世界杯最新对阵 [skip ci]"
        git push origin HEAD:main

    # ============= ✨ 新增：全自动推送到 Gitee =============
    - name: 自动同步到 Gitee 仓库
      run: |
        # 请把下方 URL 中的 [你的Gitee用户名] 和 [你的Gitee仓库名] 替换为您自己的真实名字！
        # 例如：https://oauth2:...@gitee.com/zhangsan/worldcup-calendar.git
        git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/papaya365/worldcup2026-calendar.git
        
        # 强制将最新代码推送到 Gitee 的 master 分支（国内 Gitee 默认主分支通常叫 master 或 main）
        git push -f gitee HEAD:main
