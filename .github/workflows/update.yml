name: 自动更新 2026 世界杯日历

on:
  push:
    branches:
      - fix # 只有当你推送到 fix 分支时才触发
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: # 保持手动触发，方便你随时在网页上点按钮测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整提交历史以供推送

    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 运行同步脚本并生成 ICS
      run: python update_calendar.py

    - name: 提交更新到 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add worldcup2026.ics
        
        # 既然在 fix 分支跑，直接 commit 并 push 到当前分支即可，更安全规范
        git diff-index --quiet HEAD || git commit -m "自动同步世界杯最新对阵 [skip ci]"
        git push origin HEAD
